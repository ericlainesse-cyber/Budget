<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Budget Global</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/style.css">
</head><body>
<header><h1>Budget Global</h1><button id="themeToggle">🌙</button></header>
<section class="cards">
<div id="budgetCard"></div><div id="spentCard"></div><div id="remainingCard"></div>
</section>
<input id="search" placeholder="Recherche">
<form id="txForm">
<input id="date" type="date" required>
<select id="type"><option>Depense</option><option>Revenu</option></select>
<input id="description" placeholder="Description" required>
<input id="category" placeholder="Catégorie">
<input id="amount" type="number" step="0.01" required>
<input id="attachment" type="file">
<button type="submit">Enregistrer</button>
</form>
<table><thead><tr><th>Date</th><th>Type</th><th>Description</th><th>Montant</th><th>Actions</th></tr></thead>
<tbody id="transactions"></tbody></table>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body></html>
