<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta
 name="viewport"
 content="width=device-width,initial-scale=1">

<title>Budget Pro</title>

<link
 rel="stylesheet"
 href="css/style.css">

</head>

<body>

<header>

<h1>Budget Pro</h1>

<button id="themeToggle">
🌙
</button>

</header>

<section id="dashboard">

<div class="card">

<h3>Budget</h3>

<span id="budget">
0 $
</span>

</div>

<div class="card">

<h3>Dépensé</h3>

<span id="spent">
0 $
</span>

</div>

<div class="card">

<h3>Restant</h3>

<span id="remaining">
0 $
</span>

</div>

</section>

<input
 id="search"
 placeholder="Recherche">

<table id="transactions">

<thead>

<tr>

<th>Date</th>
<th>Description</th>
<th>Montant</th>

</tr>

</thead>

<tbody></tbody>

</table>
<section class="card">

<h2>Nouvelle transaction</h2>

<form id="transactionForm">

<input
type="date"
id="date"
required>

<select id="type">

<option value="depense">
Dépense
</option>

<option value="revenu">
Revenu
</option>

</select>

<input
id="description"
placeholder="Description"
required>

<input
id="category"
placeholder="Catégorie">

<input
id="amount"
type="number"
step="0.01"
placeholder="Montant"
required>

<button type="submit">

Ajouter

</button>

</form>

</section>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>

</body>

</html>
